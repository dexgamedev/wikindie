name: Publish Docker image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          if [[ "$IS_PRERELEASE" == "false" ]]; then
            TAGS="$IMAGE:$VERSION,$IMAGE:latest"
          else
            TAGS="$IMAGE:$VERSION"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Resolved tags: $TAGS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Assemble release notes
        id: notes
        run: |
          NOTES_FILE=".github/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "$NOTES_FILE" ]]; then
            echo "Using release notes file: $NOTES_FILE"
            cp "$NOTES_FILE" release_notes.md
          else
            echo "No release notes file found at $NOTES_FILE, generating fallback from commit log"
            PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
            {
              echo "## ${GITHUB_REF_NAME}"
              echo ""
              if [[ -n "$PREV_TAG" ]]; then
                git log --no-merges --pretty='- %s' "${PREV_TAG}..${GITHUB_REF_NAME}"
              else
                git log --no-merges --pretty='- %s' "${GITHUB_REF_NAME}"
              fi
            } > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          make_latest: ${{ steps.meta.outputs.is_prerelease == 'false' }}
