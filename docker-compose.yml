services:
  wikindie:
    build: .
    environment:
      WIKINDIE_USER: "${WIKINDIE_USER:?Set WIKINDIE_USER in .env or your shell}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env or your shell}"
      SPACE_DIR: /space
      # Optional OIDC/SSO. All blank by default so local login is unaffected.
      # See README (Single sign-on) and .env.example for the full list.
      OIDC_ENABLED: "${OIDC_ENABLED:-}"
      OIDC_ISSUER: "${OIDC_ISSUER:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_REDIRECT_URI: "${OIDC_REDIRECT_URI:-}"
      OIDC_SCOPES: "${OIDC_SCOPES:-}"
      OIDC_USERNAME_CLAIM: "${OIDC_USERNAME_CLAIM:-}"
      OIDC_GROUPS_CLAIM: "${OIDC_GROUPS_CLAIM:-}"
      OIDC_ADMIN_GROUPS: "${OIDC_ADMIN_GROUPS:-}"
      OIDC_EDITOR_GROUPS: "${OIDC_EDITOR_GROUPS:-}"
      OIDC_READONLY_GROUPS: "${OIDC_READONLY_GROUPS:-}"
      OIDC_SYNC_ROLES: "${OIDC_SYNC_ROLES:-}"
      OIDC_DEFAULT_ROLE: "${OIDC_DEFAULT_ROLE:-}"
      OIDC_BUTTON_LABEL: "${OIDC_BUTTON_LABEL:-}"
      OIDC_ALLOW_INSECURE: "${OIDC_ALLOW_INSECURE:-}"
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./space:/space
